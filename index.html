<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Restomatch</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:white;font-family:Georgia,serif;display:flex;justify-content:center}
#app{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column}
.header{padding:20px 24px 8px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:22px;font-weight:bold}
.logo-sub{font-size:11px;color:rgba(255,255,255,0.3);font-family:monospace}
.mbtn{background:rgba(255,255,255,0.07);border-radius:50px;padding:8px 14px;font-size:12px;cursor:pointer;border:none;color:white}
.times{display:flex;gap:8px;padding:8px 24px;overflow-x:auto}
.tbtn{padding:6px 14px;border-radius:50px;font-size:12px;cursor:pointer;font-family:monospace;white-space:nowrap;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.07);color:white}
.tbtn.on{background:#e94560;border-color:#e94560}
.area{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 20px;position:relative;min-height:460px}
.card{width:100%;border-radius:24px;overflow:hidden;border:1px solid rgba(255,255,255,0.07);box-shadow:0 20px 60px rgba(0,0,0,0.6);position:relative;z-index:2;cursor:grab}
.next{position:absolute;inset:8px 30px;border-radius:24px;opacity:0.5;transform:scale(0.95)}
.emoji{height:180px;display:flex;align-items:center;justify-content:center;font-size:80px;background:rgba(255,255,255,0.03)}
.cbody{padding:20px 24px 28px}
.row{display:flex;justify-content:space-between;align-items:flex-start}
.cname{font-size:22px;font-weight:bold;margin-bottom:2px}
.ccuis{font-size:13px;color:rgba(255,255,255,0.5)}
.cprice{background:rgba(255,255,255,0.08);border-radius:12px;padding:6px 10px;font-size:13px;font-weight:bold}
.rating{display:flex;align-items:center;gap:4px;font-size:13px;margin:14px 0 8px}
.stars{color:#FFD700}
.tags{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tag{border-radius:50px;padding:3px 10px;font-size:11px}
.dispo{background:rgba(255,255,255,0.05);border-radius:12px;padding:10px 14px;font-size:12px}
.badge{position:absolute;top:24px;border-radius:8px;padding:4px 12px;font-size:18px;font-weight:bold;letter-spacing:2px;font-family:monospace;opacity:0;z-index:10}
.blike{left:24px;border:3px solid #4ade80;color:#4ade80;transform:rotate(-10deg)}
.bnope{right:24px;border:3px solid #f87171;color:#f87171;transform:rotate(10deg)}
.btns{display:flex;gap:24px;padding:12px 24px 40px;justify-content:center}
.bnop{width:64px;height:64px;border-radius:50%;background:rgba(248,113,113,0.1);border:2px solid rgba(248,113,113,0.3);font-size:26px;cursor:pointer}
.blik{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#e94560,#c2185b);border:none;font-size:28px;cursor:pointer;box-shadow:0 8px 24px rgba(233,69,96,0.4)}
.bbok{width:64px;height:64px;border-radius:50%;background:rgba(74,222,128,0.1);border:2px solid rgba(74,222,128,0.3);font-size:22px;cursor:pointer}
.mscreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.mcard{background:linear-gradient(135deg,#1a0a2e,#0a1a2e);border-radius:28px;padding:48px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 0 80px rgba(233,69,96,0.3);border:1px solid rgba(255,255,255,0.08)}
.mlabel{font-size:11px;letter-spacing:4px;color:#e94560;text-transform:uppercase;margin-bottom:12px;font-family:monospace}
.minfo{background:rgba(255,255,255,0.05);border-radius:16px;padding:16px 20px;margin-bottom:24px;text-align:left}
.mrow{display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px}
.bconf{background:#e94560;border-radius:50px;padding:14px 28px;font-size:14px;font-weight:bold;cursor:pointer;border:none;color:white;width:100%;margin-bottom:12px}
.bcont{font-size:13px;cursor:pointer;padding:8px;background:none;border:none;color:rgba(255,255,255,0.4)}
</style>
</head>
<body>
<div id="app"></div>
<script>
var R=[
{name:"Le Comptoir du Marché",cuisine:"Bistrot Français",rating:4.7,reviews:1243,price:"€€",distance:"320m",available:"20h30 · 21h00",tags:["Romantique","Terrasse"],bg:"#1a1a2e",accent:"#e94560",emoji:"🥩"},
{name:"Sakura Garden",cuisine:"Japonais · Sushi",rating:4.9,reviews:876,price:"€€€",distance:"150m",available:"20h30",tags:["Tendance","Groupe"],bg:"#0f3460",accent:"#e94560",emoji:"🍣"},
{name:"La Piazza Rossa",cuisine:"Italien · Pizza",rating:4.5,reviews:2109,price:"€€",distance:"500m",available:"20h00 · 20h30 · 21h15",tags:["Familial","Festif"],bg:"#16213e",accent:"#4ade80",emoji:"🍕"},
{name:"Epices et Saveurs",cuisine:"Marocain · Tajine",rating:4.6,reviews:634,price:"€€",distance:"800m",available:"20h30 · 21h00",tags:["Depaysement","Cosy"],bg:"#2d1b33",accent:"#c77dff",emoji:"🫖"},
{name:"The Smokehouse",cuisine:"BBQ Americain",rating:4.4,reviews:1567,price:"€€",distance:"220m",available:"20h00 · 21h00",tags:["Decontracte","Bar"],bg:"#1c1c1c",accent:"#ff6b35",emoji:"🍔"}
];
var S={idx:0,matches:[],time:"20h30",screen:"swipe",dx:0,drag:false,sx:0};

function st(r){var s=””;for(var i=1;i<=5;i++)s+=i<=Math.floor(r)?”★”:i-0.5<=r?”½”:”☆”;return s;}

function render(){
var app=document.getElementById(“app”);
if(!app)return;
if(S.screen===“match”){
var l=S.matches[S.matches.length-1];
app.innerHTML=’<div class="mscreen"><div class="mcard"><div style="font-size:72px;margin-bottom:8px">🎉</div><div class="mlabel">C'est un match !</div><div style="font-size:26px;font-weight:bold;margin-bottom:4px">’+l.name+’</div><div style="font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:24px">’+l.cuisine+’</div><div class="minfo"><div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px">VOTRE RESERVATION</div><div class="mrow"><span>Ce soir</span><span>’+l.time+’</span></div><div class="mrow"><span>’+l.distance+’</span><span>’+l.rating+’/5</span></div></div><button class="bconf" onclick="goSwipe()">Confirmer la resa</button><button class="bcont" onclick="goSwipe()">Continuer a swiper</button></div></div>’;
return;
}
var done=S.idx>=R.length;
var times=[“20h00”,“20h30”,“21h00”,“21h30”];
var th=’<div class="header"><div><div class="logo">Restomatch</div><div class="logo-sub">Paris · Ce soir</div></div><button class="mbtn">Matchs: ‘+S.matches.length+’</button></div>’;
var tt=’<div class="times">’+times.map(function(t){return’<button class="tbtn'+(t===S.time?' on':'')+'" onclick="setT(\''+t+'\')">’+t+’</button>’;}).join(’’)+’</div>’;
var ca=’’;
if(done){
ca=’<div class="area"><div style="text-align:center;color:rgba(255,255,255,0.4)"><div style="font-size:48px;margin-bottom:16px">✨</div><div style="font-size:18px;margin-bottom:8px">Plus de restos !</div><div>’+S.matches.length+’ match’+(S.matches.length>1?‘s’:’’)+’</div></div></div>’;
} else {
var r=R[S.idx];
var nx=R[S.idx+1]?’<div class="next" style="background:'+R[S.idx+1].bg+'"></div>’:’’;
var tgs=r.tags.map(function(t){return’<span class="tag" style="background:'+r.accent+'33;border:1px solid '+r.accent+'66;color:'+r.accent+'">’+t+’</span>’;}).join(’’);
ca=’<div class="area">’+nx+’<div class="card" id="MC" style="background:linear-gradient(160deg,'+r.bg+',#0a0a0f)"><div class="badge blike" id="BL">LIKE</div><div class="badge bnope" id="BN">NOPE</div><div class="emoji">’+r.emoji+’</div><div class="cbody"><div class="row"><div><div class="cname">’+r.name+’</div><div class="ccuis">’+r.cuisine+’</div></div><div class="cprice">’+r.price+’</div></div><div class="rating"><span class="stars">’+st(r.rating)+’</span><strong>’+r.rating+’</strong><span style="color:rgba(255,255,255,0.35);font-size:11px">(’+r.reviews+’)</span><span style="margin-left:8px;font-size:12px;color:rgba(255,255,255,0.5)">’+r.distance+’</span></div><div class="tags">’+tgs+’</div><div class="dispo"><span style="color:rgba(255,255,255,0.4)">Dispo : </span><span style="color:#4ade80;font-family:monospace">’+r.available+’</span></div></div></div></div>’;
}
var bb=done?’’:’<div class="btns"><button class="bnop" onclick="swipe(\'left\')">✕</button><button class="blik" onclick="swipe(\'right\')">❤</button><button class="bbok" onclick="swipe(\'right\')">📅</button></div>’;
app.innerHTML=th+tt+ca+bb;
if(!done)setupDrag();
}

function setupDrag(){
var c=document.getElementById(“MC”);
if(!c)return;
function gs(e){S.drag=true;S.sx=(e.touches?e.touches[0].clientX:e.clientX)||0;}
function gm(e){
if(!S.drag)return;
var x=((e.touches?e.touches[0].clientX:e.clientX)||0)-S.sx;
S.dx=x;
c.style.transform=‘translateX(’+x+‘px) rotate(’+(x*0.05)+‘deg)’;
c.style.transition=‘none’;
var bl=document.getElementById(“BL”),bn=document.getElementById(“BN”);
if(bl)bl.style.opacity=Math.min(1,x/80);
if(bn)bn.style.opacity=Math.min(1,-x/80);
}
function ge(){
if(!S.drag)return;
S.drag=false;
if(Math.abs(S.dx)>80)swipe(S.dx>0?‘right’:‘left’);
else{c.style.transform=’’;c.style.transition=’’;S.dx=0;}
}
c.addEventListener(‘mousedown’,gs);
c.addEventListener(‘mousemove’,gm);
c.addEventListener(‘mouseup’,ge);
c.addEventListener(‘mouseleave’,ge);
c.addEventListener(‘touchstart’,gs,{passive:true});
c.addEventListener(‘touchmove’,gm,{passive:true});
c.addEventListener(‘touchend’,ge);
}

function swipe(dir){
var c=document.getElementById(“MC”);
if(!c)return;
c.style.transition=‘transform 0.4s ease,opacity 0.4s’;
c.style.transform=dir===‘right’?‘translateX(120%) rotate(15deg)’:‘translateX(-120%) rotate(-15deg)’;
c.style.opacity=‘0.3’;
setTimeout(function(){
if(dir===‘right’){
var r=R[S.idx];
S.matches.push({name:r.name,cuisine:r.cuisine,distance:r.distance,rating:r.rating,time:S.time});
S.screen=‘match’;
}
S.idx++;
S.dx=0;
render();
},400);
}

function setT(t){S.time=t;render();}
function goSwipe(){S.screen=‘swipe’;render();}

window.onload=function(){render();};
</script>

</body>
</html>
