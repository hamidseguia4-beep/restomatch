<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Restomatch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #0a0a0f; color: white; font-family: Georgia, serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
  #app { width: 100%; max-width: 430px; min-height: 100vh; display: flex; flex-direction: column; }
  .header { padding: 20px 24px 8px; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-size: 22px; font-weight: bold; }
  .logo-sub { font-size: 11px; color: rgba(255,255,255,0.3); font-family: monospace; }
  .matches-btn { background: rgba(255,255,255,0.07); border-radius: 50px; padding: 8px 14px; font-size: 12px; cursor: pointer; border: none; color: white; }
  .times { display: flex; gap: 8px; padding: 8px 24px; overflow-x: auto; }
  .time-btn { padding: 6px 14px; border-radius: 50px; font-size: 12px; cursor: pointer; font-family: monospace; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.07); color: white; transition: background 0.2s; }
  .time-btn.active { background: #e94560; border-color: #e94560; }
  .card-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px 20px; position: relative; min-height: 460px; }
  .card { width: 100%; border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.07); box-shadow: 0 20px 60px rgba(0,0,0,0.6); position: relative; z-index: 2; cursor: grab; transition: transform 0.15s; }
  .card.animating { transition: transform 0.4s cubic-bezier(.4,2,.6,1), opacity 0.4s; }
  .card-next { position: absolute; inset: 8px 30px; border-radius: 24px; opacity: 0.5; transform: scale(0.95); }
  .card-emoji { height: 200px; display: flex; align-items: center; justify-content: center; font-size: 90px; background: rgba(255,255,255,0.03); }
  .card-body { padding: 20px 24px 28px; }
  .card-title { font-size: 22px; font-weight: bold; margin-bottom: 2px; }
  .card-cuisine { font-size: 13px; color: rgba(255,255,255,0.5); }
  .card-price { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 6px 10px; font-size: 13px; font-weight: bold; }
  .card-rating { display: flex; align-items: center; gap: 4px; font-size: 13px; margin: 14px 0 8px; }
  .stars { color: #FFD700; }
  .card-tags { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .tag { border-radius: 50px; padding: 3px 10px; font-size: 11px; }
  .card-dispo { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px 14px; font-size: 12px; }
  .dispo-label { color: rgba(255,255,255,0.4); }
  .dispo-times { color: #4ade80; font-family: monospace; }
  .badge { position: absolute; top: 24px; border-radius: 8px; padding: 4px 12px; font-size: 18px; font-weight: bold; letter-spacing: 2px; font-family: monospace; opacity: 0; transition: opacity 0.1s; z-index: 10; }
  .badge-like { left: 24px; border: 3px solid #4ade80; color: #4ade80; transform: rotate(-10deg); }
  .badge-nope { right: 24px; border: 3px solid #f87171; color: #f87171; transform: rotate(10deg); }
  .buttons { display: flex; gap: 24px; padding: 12px 24px 40px; justify-content: center; }
  .btn-nope { width: 64px; height: 64px; border-radius: 50%; background: rgba(248,113,113,0.1); border: 2px solid rgba(248,113,113,0.3); font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .btn-like { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #e94560, #c2185b); border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(233,69,96,0.4); }
  .btn-book { width: 64px; height: 64px; border-radius: 50%; background: rgba(74,222,128,0.1); border: 2px solid rgba(74,222,128,0.3); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .screen-match { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .match-card { background: linear-gradient(135deg, #1a0a2e, #0a1a2e); border-radius: 28px; padding: 48px 32px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 0 80px rgba(233,69,96,0.3); border: 1px solid rgba(255,255,255,0.08); }
  .match-label { font-size: 11px; letter-spacing: 4px; color: #e94560; text-transform: uppercase; margin-bottom: 12px; font-family: monospace; }
  .match-name { font-size: 26px; font-weight: bold; margin-bottom: 4px; }
  .match-cuisine { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
  .match-info { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 16px 20px; margin-bottom: 24px; text-align: left; }
  .match-info-label { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
  .match-info-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
  .btn-confirm { background: #e94560; border-radius: 50px; padding: 14px 28px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; color: white; letter-spacing: 1px; width: 100%; margin-bottom: 12px; }
  .btn-continue { font-size: 13px; color: rgba(255,255,255,0.4); cursor: pointer; padding: 8px; background: none; border: none; color: rgba(255,255,255,0.4); }
  .empty { text-align: center; color: rgba(255,255,255,0.4); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-size: 18px; margin-bottom: 8px; }
  .btn-see-matches { margin-top: 20px; background: #e94560; border-radius: 50px; padding: 12px 24px; cursor: pointer; font-size: 14px; border: none; color: white; }
  .row-between { display: flex; justify-content: space-between; align-items: flex-start; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const restaurants = [
  { id:1, name:"Le Comptoir du Marché", cuisine:"Bistrot Français", rating:4.7, reviews:1243, price:"€€", distance:"320m", available:"20h30 · 21h00", tags:["Romantique","Terrasse"], bg:"#1a1a2e", accent:"#e94560", emoji:"🥩" },
  { id:2, name:"Sakura Garden", cuisine:"Japonais · Sushi", rating:4.9, reviews:876, price:"€€€", distance:"150m", available:"20h30", tags:["Tendance","Groupe"], bg:"#0f3460", accent:"#e94560", emoji:"🍣" },
  { id:3, name:"La Piazza Rossa", cuisine:"Italien · Pizza", rating:4.5, reviews:2109, price:"€€", distance:"500m", available:"20h00 · 20h30 · 21h15", tags:["Familial","Festif"], bg:"#16213e", accent:"#0f3460", emoji:"🍕" },
  { id:4, name:"Épices & Saveurs", cuisine:"Marocain · Tajine", rating:4.6, reviews:634, price:"€€", distance:"800m", available:"20h30 · 21h00", tags:["Dépaysement","Cosy"], bg:"#2d1b33", accent:"#c77dff", emoji:"🫖" },
  { id:5, name:"The Smokehouse", cuisine:"BBQ Américain", rating:4.4, reviews:1567, price:"€€", distance:"220m", available:"20h00 · 21h00", tags:["Décontracté","Bar"], bg:"#1c1c1c", accent:"#ff6b35", emoji:"🍔" }
];

let state = { index:0, matches:[], selectedTime:“20h30”, screen:“swipe”, dragX:0, dragging:false, dragStartX:0 };

function stars(r){ let s=””; for(let i=1;i<=5;i++) s+=i<=Math.floor(r)?“★”:i-0.5<=r?“½”:“☆”; return s; }

function render(){
const app = document.getElementById(“app”);
const r = restaurants[state.index];
const done = state.index >= restaurants.length;

if(state.screen === “match”){
const last = state.matches[state.matches.length-1];
app.innerHTML = ` <div class="screen-match"> <div class="match-card"> <div style="font-size:72px;margin-bottom:8px">🎉</div> <div class="match-label">C'est un match !</div> <div class="match-name">${last.name}</div> <div class="match-cuisine">${last.cuisine}</div> <div class="match-info"> <div class="match-info-label">VOTRE RÉSERVATION</div> <div class="match-info-row"><span>📅 Ce soir</span><span>🕗 ${last.time}</span></div> <div class="match-info-row"><span>📍 ${last.distance}</span><span>⭐ ${last.rating}</span></div> </div> <button class="btn-confirm" onclick="confirm()">✅ Confirmer la résa</button> <button class="btn-continue" onclick="goSwipe()">Continuer à swiper →</button> </div> </div>`;
return;
}

let cardHTML = “”;
if(done){
cardHTML = `<div class="empty"> <div class="empty-icon">✨</div> <div class="empty-title">Plus de restos pour ce soir</div> <div>Tu as ${state.matches.length} match${state.matches.length>1?"s":""} !</div> ${state.matches.length>0?`<button class="btn-see-matches" onclick="goMatches()">Voir mes matchs</button>`:""} </div>`;
} else {
const next = restaurants[state.index+1];
cardHTML = ` ${next?`<div class="card-next" style="background:${next.bg}"></div>`:""} <div class="card" id="maincard" style="background:linear-gradient(160deg,${r.bg},#0a0a0f)"> <div class="badge badge-like" id="badge-like">LIKE</div> <div class="badge badge-nope" id="badge-nope">NOPE</div> <div class="card-emoji">${r.emoji}</div> <div class="card-body"> <div class="row-between"> <div><div class="card-title">${r.name}</div><div class="card-cuisine">${r.cuisine}</div></div> <div class="card-price">${r.price}</div> </div> <div class="card-rating"> <span class="stars">${stars(r.rating)}</span> <strong>${r.rating}</strong> <span style="color:rgba(255,255,255,0.35);font-size:11px">(${r.reviews})</span> <span style="color:rgba(255,255,255,0.2)">·</span> <span style="font-size:12px;color:rgba(255,255,255,0.5)">📍 ${r.distance}</span> </div> <div class="card-tags">${r.tags.map(t=>`<span class="tag" style="background:${r.accent}22;border:1px solid ${r.accent}44;color:${r.accent}">${t}</span>`).join("")}</div> <div class="card-dispo"><span class="dispo-label">Dispo ce soir : </span><span class="dispo-times">${r.available}</span></div> </div> </div>`;
}

const times = [“20h00”,“20h30”,“21h00”,“21h30”];
app.innerHTML = ` <div class="header"> <div><div class="logo">🍽 Restomatch</div><div class="logo-sub">Paris · Ce soir</div></div> <button class="matches-btn" onclick="goMatches()">❤️ ${state.matches.length}</button> </div> <div class="times">${times.map(t=>`<button class=“time-btn ${t===state.selectedTime?“active”:””}” onclick=“setTime(’${t}’)”>${t}</button>`).join("")}</div> <div class="card-area">${cardHTML}</div> ${!done?`<div class="buttons">
<button class="btn-nope" onclick="swipe('left')">✕</button>
<button class="btn-like" onclick="swipe('right')">❤️</button>
<button class="btn-book" onclick="swipe('right')">📅</button>
</div>`:""}`;

if(!done) setupDrag();
}

function setupDrag(){
const card = document.getElementById(“maincard”);
if(!card) return;
const start = e => { state.dragging=true; state.dragStartX = e.clientX||e.touches?.[0]?.clientX; };
const move = e => {
if(!state.dragging) return;
const x = (e.clientX||e.touches?.[0]?.clientX) - state.dragStartX;
state.dragX = x;
card.style.transform = `translateX(${x}px) rotate(${x*0.05}deg)`;
card.style.transition = “none”;
const like = document.getElementById(“badge-like”);
const nope = document.getElementById(“badge-nope”);
if(like) like.style.opacity = Math.min(1, x/80);
if(nope) nope.style.opacity = Math.min(1, -x/80);
};
const end = () => {
if(!state.dragging) return;
state.dragging = false;
if(Math.abs(state.dragX) > 80) swipe(state.dragX>0?“right”:“left”);
else { card.style.transform=””; card.style.transition=””; state.dragX=0; }
};
card.addEventListener(“mousedown”, start);
card.addEventListener(“mousemove”, move);
card.addEventListener(“mouseup”, end);
card.addEventListener(“mouseleave”, end);
card.addEventListener(“touchstart”, start, {passive:true});
card.addEventListener(“touchmove”, move, {passive:true});
card.addEventListener(“touchend”, end);
}

function swipe(dir){
const card = document.getElementById(“maincard”);
if(!card) return;
card.classList.add(“animating”);
card.style.transform = dir===“right” ? “translateX(120%) rotate(15deg)” : “translateX(-120%) rotate(-15deg)”;
card.style.opacity = “0.7”;
setTimeout(()=>{
if(dir===“right”){
state.matches.push({…restaurants[state.index], time:state.selectedTime});
state.screen = “match”;
}
state.index++;
state.dragX = 0;
render();
}, 400);
}

function setTime(t){ state.selectedTime=t; render(); }
function goSwipe(){ state.screen=“swipe”; render(); }
function goMatches(){ alert(state.matches.length===0?“Pas encore de matchs !”:“Tes matchs :\n”+state.matches.map(m=>`• ${m.name} à ${m.time}`).join(”\n”)); }
function confirm(){ alert(“Réservation confirmée ! 🎉\n(Dans la vraie app, ça enverrait la résa au restaurant)”); goSwipe(); }

render();
</script>

</body>
</html>
